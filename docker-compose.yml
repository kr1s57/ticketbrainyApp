###############################################################################
#  TicketBrainy — Production Docker Compose
#  Copy .env.example to .env, fill in your values, then:
#    docker compose up -d
###############################################################################

services:
  # ── Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ticketbrainy}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ticketbrainy}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./keycloak/init-schema.sql:/docker-entrypoint-initdb.d/01-keycloak-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ticketbrainy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Cache & Queues ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Database Migrations + Seed (runs once, then exits) ───────
  migrate:
    image: ghcr.io/kr1s57/ticketbrainy-migrate:latest
    # Apply schema then seed the admin user. Without this command override
    # the image falls back to the base node CMD and exits without running
    # migrations — which leaves the DB empty and login returns 401.
    command: sh -c "cd /app/apps/web && npx prisma db push --schema=prisma/schema.prisma && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # ── SSO (Keycloak) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    entrypoint: ["/opt/keycloak/custom-entry/docker-entrypoint.sh"]
    # In Caddy mode set KC_BIND=127.0.0.1 in .env so this port is NOT
    # exposed on the public internet — Caddy reaches Keycloak via the
    # internal docker network (keycloak:8080), so the host port is only
    # useful for local debugging. Default 0.0.0.0 keeps LAN deployments
    # working (admins on the LAN can hit http://<server-ip>:8180).
    ports:
      - "${KC_BIND:-0.0.0.0}:${KC_PORT:-8180}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-ticketbrainy}?currentSchema=${KC_DB_SCHEMA:-keycloak}
      KC_DB_USERNAME: ${DB_USER:-ticketbrainy}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: ${KC_DB_SCHEMA:-keycloak}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      APP_PORT: ${APP_PORT:-4000}
      LAN_HOST: ${LAN_HOSTS:-localhost}
    volumes:
      - ./keycloak/ticketbrainy-realm.json:/opt/keycloak/data/realm-template/ticketbrainy-realm.json:ro
      - ./keycloak/docker-entrypoint.sh:/opt/keycloak/custom-entry/docker-entrypoint.sh:ro
      - ./keycloak/themes/ticketbrainy:/opt/keycloak/themes/ticketbrainy:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Keycloak hardening sync (one-shot, idempotent) ─────────
  # Re-applies our security defaults on every `up -d`. Survives
  # Keycloak image upgrades and accidental admin-UI changes that
  # would revert loginTheme, bruteForceProtected, password policy,
  # OTP algorithm, etc. Logs: docker compose logs keycloak-init
  keycloak-init:
    image: curlimages/curl:8.10.1
    restart: "no"
    # v1.10.13: run as root so the container can write the admin-read
    # client secret into the kc-secrets volume that the web container
    # mounts read-only. Without this override curlimages/curl runs as
    # uid 100 and can't create files in a root-owned named volume.
    # The script only does curl + file writes, no network exposure.
    user: "0:0"
    entrypoint: ["sh", "/opt/keycloak-init/apply-config.sh"]
    environment:
      KC_INTERNAL_URL: http://keycloak:8080
      KC_REALM: ${KEYCLOAK_REALM:-ticketbrainy}
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      MAX_WAIT_SECONDS: 180
    volumes:
      - ./keycloak/apply-config.sh:/opt/keycloak-init/apply-config.sh:ro
      # v1.10.13: kc-secrets shared volume. apply-config.sh writes the
      # ticketbrainy-admin-read client secret here after creating the
      # client; the web container mounts the same volume read-only at
      # /data/keycloak-secrets and reads the secret automatically. No
      # more manual "copy from logs into .env and restart" dance.
      - kc-secrets:/opt/keycloak-init/secrets
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - internal

  # ── Web Application ─────────────────────────────────────────
  web:
    image: ghcr.io/kr1s57/ticketbrainy-web:latest
    restart: unless-stopped
    # v1.10.131 (hardening P0) — fix C-01 : bind le port Next.js sur
    # 127.0.0.1 par défaut pour empêcher son exposition HTTP clair
    # directement sur Internet. Caddy atteint le container via le
    # réseau Docker interne (web:3000), donc fermer le port côté hôte
    # est transparent pour le reverse proxy. Un opérateur qui tourne
    # sans Caddy (mode "direct / vps-naked") peut remettre le port
    # publiquement en passant WEB_BIND=0.0.0.0 dans son .env, mais le
    # défaut sûr reste localhost.
    ports:
      - "${WEB_BIND:-127.0.0.1}:${APP_PORT:-4000}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      AI_SERVICE_URL: http://ai-service:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-ticketbrainy}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ticketbrainy-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-}
      LAN_HOSTS: ${LAN_HOSTS:-localhost}
      VIGILANCE_KEY_URL: ${VIGILANCE_KEY_URL:-https://license.ticketbrainy.com}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-}
      UPLOAD_STORAGE_PATH: /data/uploads
      INSTANCE_ID_PATH: /data/.instance-id
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # v1.10.0: Security Settings page — read-only Keycloak admin client
      # (the keycloak-init container creates it idempotently and prints the
      # secret once in its logs). Leave empty on first boot, then copy the
      # value from the logs into .env and recreate the web container.
      KC_ADMIN_READ_CLIENT_ID: ${KC_ADMIN_READ_CLIENT_ID:-ticketbrainy-admin-read}
      KC_ADMIN_READ_CLIENT_SECRET: ${KC_ADMIN_READ_CLIENT_SECRET:-}
      KC_REALM: ${KEYCLOAK_REALM:-ticketbrainy}
      KC_BASE_URL: http://keycloak:8080
      CADDY_DATA_DIR: /data/caddy
      SECURITY_ALLOWLIST_BYPASS: ${SECURITY_ALLOWLIST_BYPASS:-}
      # v1.10.03: pass deployment topology through to the web container so
      # Settings → Deployment (getLiveConfig) and the activate wizard (mode
      # auto-detection) can read the actual installed topology instead of
      # showing everything empty/disabled. These were previously only used
      # by docker-compose itself for Caddy variable substitution.
      APP_URL: ${APP_URL:-}
      APP_DOMAIN: ${APP_DOMAIN:-}
      APP_PORT: ${APP_PORT:-4000}
      KEYCLOAK_DOMAIN: ${KEYCLOAK_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      # v1.10.05: pre-fill the /activate wizard's email field so the
      # operator doesn't re-type what install.sh already captured.
      LICENSE_EMAIL: ${LICENSE_EMAIL:-}
    volumes:
      - app-data:/data
      - claude-config:/home/nextjs/.claude
      # v1.10.0: read Caddy certs for the Security page SSL panel. Empty
      # volume on LAN/WAF deployments where Caddy is not used — adapters
      # handle this gracefully and show "No certificates detected".
      - caddy-data:/data/caddy:ro
      # v1.10.13: read the ticketbrainy-admin-read client secret that
      # keycloak-init writes on every boot. keycloak-admin.ts loads it
      # lazily when KC_ADMIN_READ_CLIENT_SECRET env var is empty, so
      # fresh installs get the Security → Authentication panel working
      # immediately without any manual .env edit.
      - kc-secrets:/data/keycloak-secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── AI Analysis Service ─────────────────────────────────────
  ai-service:
    image: ghcr.io/kr1s57/ticketbrainy-ai:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_SERVICE_PORT: "3001"
    volumes:
      - claude-config:/home/appuser/.claude
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── Email Processing Service ────────────────────────────────
  mail-service:
    image: ghcr.io/kr1s57/ticketbrainy-mail:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      IMAP_POLL_INTERVAL: ${IMAP_POLL_INTERVAL:-30}
      ATTACHMENT_STORAGE_PATH: /data/attachments
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_SERVICE_URL: http://ai-service:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── Telegram Bot ────────────────────────────────────────────
  telegram-bot:
    image: ghcr.io/kr1s57/ticketbrainy-telegram:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── Reverse Proxy (optional, for direct internet exposure) ──
  # Activated with: docker compose --profile with-proxy up -d
  # Handles HTTPS automatically via Let's Encrypt (auto-renewed)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["with-proxy"]
    # v1.10.11: custom entrypoint wraps `caddy run` with a background
    # loop that widens perms on public cert files (*.crt and their
    # parent dirs) so the web container can display cert expiry info
    # in Settings → Security. Private keys (*.key) stay 600 — never
    # exposed. See proxy/caddy-entrypoint.sh for the full rationale.
    entrypoint: ["/bin/sh", "/etc/caddy/caddy-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
      KEYCLOAK_DOMAIN: ${KEYCLOAK_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./proxy/caddy-entrypoint.sh:/etc/caddy/caddy-entrypoint.sh:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - internal

volumes:
  pg-data:
  redis-data:
  app-data:
  claude-config:
  caddy-data:
  caddy-config:
  kc-secrets:

networks:
  internal:
    driver: bridge
