services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ticketbrainy}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ticketbrainy}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./keycloak/init-schema.sql:/docker-entrypoint-initdb.d/01-keycloak-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ticketbrainy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: sh -c "cd apps/web && npx prisma db push"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    pull_policy: build

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    entrypoint: ["/opt/keycloak/custom-entry/docker-entrypoint.sh"]
    # v1.10.02: KC_BIND makes the host port bind configurable. Default
    # 0.0.0.0 keeps LAN deployments working; Caddy-mode installs should
    # set KC_BIND=127.0.0.1 in .env so the admin console isn't exposed
    # publicly on IP:8180 (Caddy reaches it via the internal network).
    ports:
      - "${KC_BIND:-0.0.0.0}:${KC_PORT:-8180}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-ticketbrainy}?currentSchema=${KC_DB_SCHEMA:-keycloak}
      KC_DB_USERNAME: ${DB_USER:-ticketbrainy}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: ${KC_DB_SCHEMA:-keycloak}
      # v1.8.5: request-based hostname detection (no KC_HOSTNAME pin).
      #
      # Keycloak 26 only supports ONE global hostname config, but this
      # install serves TWO distinct frontends from the same instance:
      #
      #   * `auth.ticketbrainy.com` (WAF, public) → user flows on the
      #     `ticketbrainy` realm (SSO login, password reset, 2FA enroll,
      #     enrollment emails)
      #   * `http://10.55.112.112:3028` (direct LAN) → admin console on
      #     the `master` realm — never exposed externally (WAF blocks
      #     /admin/*).
      #
      # Trying to pin KC_HOSTNAME breaks whichever frontend isn't the
      # pinned one (v1.8.2→v1.8.4 rabbit hole: pinning to the public URL
      # made the LAN admin console hit CORS + cross-domain-cookie walls,
      # pinning to the LAN URL would leak internal IPs in emails).
      #
      # Instead: leave KC_HOSTNAME UNSET and rely on request-based URL
      # generation. X-Forwarded-Host from the WAF gives the public URL
      # for WAF traffic; direct LAN requests carry their own host.
      # KC_PROXY_HEADERS=xforwarded tells Keycloak to trust X-Forwarded-*.
      #
      # To keep user-flow emails deterministic (independent of which
      # host triggered them from the admin side), the `ticketbrainy`
      # realm has its `frontendUrl` attribute pinned to
      # ${KEYCLOAK_URL} via apply-config.sh — that attribute overrides
      # the request-host for email link generation on that realm only.
      # The `master` realm gets no frontendUrl override because admin
      # access only ever happens from the LAN.
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      APP_PORT: ${APP_PORT:-3027}
      LAN_HOST: ${LAN_HOSTS:-localhost}
    volumes:
      - ./keycloak/ticketbrainy-realm.json:/opt/keycloak/data/realm-template/ticketbrainy-realm.json:ro
      - ./keycloak/docker-entrypoint.sh:/opt/keycloak/custom-entry/docker-entrypoint.sh:ro
      - ./keycloak/themes/ticketbrainy:/opt/keycloak/themes/ticketbrainy:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # keycloak-init — one-shot post-start hardening sync
  # ---------------------------------------------------------------------------
  # Re-applies our realm security defaults + login theme on every `up -d`.
  # Idempotent. Survives Keycloak image upgrades and accidental UI changes
  # that revert security settings (loginTheme, bruteForceProtected, ...).
  # Logs:  docker logs aidesk-keycloak-init-1
  keycloak-init:
    image: curlimages/curl:8.10.1
    restart: "no"
    # v1.10.13: run as root so the container can write the admin-read
    # client secret into the kc-secrets volume. See the public
    # docker-compose.yml for the full rationale.
    user: "0:0"
    entrypoint: ["sh", "/opt/keycloak-init/apply-config.sh"]
    environment:
      KC_INTERNAL_URL: http://keycloak:8080
      KC_REALM: ${KEYCLOAK_REALM:-ticketbrainy}
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # v1.8.2: passed through to apply-config.sh so the realm's
      # frontendUrl attribute is pinned to the public URL — every
      # email action link generated by Keycloak uses this base.
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_URL}
      MAX_WAIT_SECONDS: 180
    volumes:
      - ./keycloak/apply-config.sh:/opt/keycloak-init/apply-config.sh:ro
      # v1.10.13: kc-secrets — apply-config.sh writes the
      # ticketbrainy-admin-read client secret here for the web
      # container to pick up automatically (no .env edit required).
      - kc-secrets:/opt/keycloak-init/secrets
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    # Start as root so docker-claude-init.sh can read host-mounted
    # Claude credentials (owned by root:root on the host) and drop to
    # nextjs (uid 1001) via su-exec for the Node server process.
    user: "0:0"
    # v1.10.131 (hardening P0) — fix C-01 : bind le port sur 127.0.0.1 pour
    # empêcher l'exposition HTTP clair du service web directement sur
    # Internet. En mode Caddy, le reverse proxy atteint le container via
    # le réseau Docker interne (web:3000), donc fermer le port côté hôte
    # est transparent pour Caddy. Ça conserve l'accès local via
    # http://127.0.0.1:${APP_PORT} pour le debug SSH port-forward et les
    # curls de healthcheck depuis l'hôte (install.sh en utilise 2).
    # Variable WEB_BIND surchargeable : si un opérateur passe réellement
    # en mode "direct / vps-naked" il peut mettre WEB_BIND=0.0.0.0 dans
    # son .env pour réouvrir le port publiquement, mais le défaut sûr
    # reste localhost.
    ports:
      - "${WEB_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      AI_SERVICE_URL: http://ai-service:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-}
      LAN_HOSTS: ${LAN_HOSTS:-localhost}
      VIGILANCE_KEY_URL: ${VIGILANCE_KEY_URL:-https://license.ticketbrainy.com}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-}
      UPLOAD_STORAGE_PATH: /data/uploads
      INSTANCE_ID_PATH: /data/.instance-id
      KC_ADMIN_READ_CLIENT_ID: ${KC_ADMIN_READ_CLIENT_ID:-ticketbrainy-admin-read}
      KC_ADMIN_READ_CLIENT_SECRET: ${KC_ADMIN_READ_CLIENT_SECRET:-}
      KC_REALM: ${KEYCLOAK_REALM:-ticketbrainy}
      KC_BASE_URL: http://keycloak:8080
      CADDY_DATA_DIR: /data/caddy
      SECURITY_ALLOWLIST_BYPASS: ${SECURITY_ALLOWLIST_BYPASS:-}
      # v1.10.03: pass deployment topology through to the web container so
      # Settings → Deployment (getLiveConfig) and the activate wizard (mode
      # auto-detection) can read the actual installed topology instead of
      # showing everything empty/disabled. These were previously only used
      # by docker-compose itself for Caddy variable substitution.
      APP_URL: ${APP_URL:-}
      APP_DOMAIN: ${APP_DOMAIN:-}
      APP_PORT: ${APP_PORT:-4000}
      KEYCLOAK_DOMAIN: ${KEYCLOAK_DOMAIN:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      # v1.10.05: pre-fill the /activate wizard's email field so the
      # operator doesn't re-type what install.sh already captured.
      LICENSE_EMAIL: ${LICENSE_EMAIL:-}
    volumes:
      - app-data:/data
      - claude-config:/home/nextjs/.claude
      # Host Claude CLI creds, read-only. Synced into the persistent volume
      # by docker-claude-init.sh at container start so AI features keep
      # working after rebuilds without any manual script. See:
      # feedback_ai_must_survive_rebuild.md
      - ${HOST_CLAUDE_CREDS_FILE:-/root/.claude/.credentials.json}:/host-claude/credentials.json:ro
      - ${HOST_CLAUDE_CONFIG_FILE:-/root/.claude.json}:/host-claude/claude.json:ro
      # v1.10.0: Caddy cert mount (read-only). Empty volume on LAN/WAF
      # deployments where Caddy is not used; populated on VPS Caddy
      # deployments. Security adapters gracefully handle empty mount.
      - caddy-data:/data/caddy:ro
      # v1.10.13: read the ticketbrainy-admin-read client secret that
      # keycloak-init writes on every boot. Lazy-loaded by
      # keycloak-admin.ts when KC_ADMIN_READ_CLIENT_SECRET env is empty.
      - kc-secrets:/data/keycloak-secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    restart: unless-stopped
    # Start as root so docker-claude-init.sh can read host-mounted
    # Claude credentials and drop to appuser (uid 1001) via su-exec.
    user: "0:0"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_SERVICE_PORT: "3001"
    volumes:
      - claude-config:/home/appuser/.claude
      # Host Claude CLI creds, read-only. Synced into the persistent volume
      # by docker-claude-init.sh at container start so AI features keep
      # working after rebuilds without any manual script.
      - ${HOST_CLAUDE_CREDS_FILE:-/root/.claude/.credentials.json}:/host-claude/credentials.json:ro
      - ${HOST_CLAUDE_CONFIG_FILE:-/root/.claude.json}:/host-claude/claude.json:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  mail-service:
    build:
      context: .
      dockerfile: apps/mail-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      IMAP_POLL_INTERVAL: ${IMAP_POLL_INTERVAL:-30}
      ATTACHMENT_STORAGE_PATH: /data/attachments
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_SERVICE_URL: http://ai-service:3001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ticketbrainy}:${DB_PASSWORD}@db:5432/${DB_NAME:-ticketbrainy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

volumes:
  pg-data:
  redis-data:
  app-data:
  claude-config:
  caddy-data:
  kc-secrets:

networks:
  internal:
    driver: bridge
